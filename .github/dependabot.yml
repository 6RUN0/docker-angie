# Dependabot tracks what it can resolve declaratively: base images in the two
# Dockerfiles (FROM/ARG ...=image:tag) and the GitHub Actions used in workflows.
#
# It does NOT track the angie/angie-module-* apk/apt packages (pinned via
# ARG ANGIE_VERSION, installed inside RUN) nor the angie-ctl pin
# (ARG ANGIE_CTL_COMMIT, fetched by git). The upstream-check workflow
# (.github/workflows/upstream-check.yml) covers those: it opens a PR bumping
# both pins in the two Dockerfiles when a newer Angie package or angie-ctl
# commit appears.
version: 2
updates:
  - package-ecosystem: docker
    directory: /alpine
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /debian
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
