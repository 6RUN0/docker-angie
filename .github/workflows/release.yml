name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: alpine
            dockerfile: alpine/Dockerfile
            latest: "true"
          - variant: debian
            dockerfile: debian/Dockerfile
            latest: "false"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 # zizmor: ignore[artipacked] (no git push; persisted token unused)

      - name: Compute image tags
        id: tags
        env:
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          VARIANT: ${{ matrix.variant }}
          LATEST: ${{ matrix.latest }}
        run: |
          set -eu
          ver=${REF_NAME#v}                                  # v1.2.3 -> 1.2.3
          base="ghcr.io/$(printf '%s' "$REPO" | tr '[:upper:]' '[:lower:]')"
          # The immutable, fully-qualified tag is always published.
          tags="$base:${ver}-${VARIANT}"
          # Floating tags (major.minor, channel, latest) only for stable releases:
          # a SemVer prerelease (contains '-', e.g. 1.2.3-rc1) must not move them.
          case "$ver" in
          *-*) ;;
          *)
            # major.minor floating tag only for a 3-component X.Y.Z release; a
            # 2-component tag (e.g. v1.2) would otherwise yield a bare major tag.
            case "$ver" in
            *.*.*) tags="$tags,$base:${ver%.*}-${VARIANT}" ;;
            esac
            tags="$tags,$base:${VARIANT}"
            if [ "$LATEST" = "true" ]; then
              tags="$tags,$base:latest"
            fi
            ;;
          esac
          printf 'tags=%s\n' "$tags" >>"$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

  release-unprivileged:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: alpine
            dockerfile: alpine/Dockerfile
          - variant: debian
            dockerfile: debian/Dockerfile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 # zizmor: ignore[artipacked] (no git push; persisted token unused)

      - name: Compute image tags
        id: tags
        env:
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          VARIANT: ${{ matrix.variant }}
        run: |
          set -eu
          ver=${REF_NAME#v}
          base="ghcr.io/$(printf '%s' "$REPO" | tr '[:upper:]' '[:lower:]')"
          sfx="${VARIANT}-unprivileged"
          # The immutable, fully-qualified tag is always published.
          tags="$base:${ver}-${sfx}"
          # Floating tags only for stable releases (see the base release job).
          case "$ver" in
          *-*) ;;
          *)
            # major.minor floating tag only for a 3-component X.Y.Z release.
            case "$ver" in
            *.*.*) tags="$tags,$base:${ver%.*}-${sfx}" ;;
            esac
            tags="$tags,$base:${sfx}"
            ;;
          esac
          # The rootless image is built FROM the just-pushed base tag.
          printf 'tags=%s\n' "$tags" >>"$GITHUB_OUTPUT"
          printf 'base=%s:%s-%s\n' "$base" "$ver" "$VARIANT" >>"$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (rootless)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}.unprivileged
          build-args: BASE_IMAGE=${{ steps.tags.outputs.base }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.variant }}-unprivileged
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}-unprivileged
