name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: alpine
            dockerfile: alpine/Dockerfile
            latest: "true"
          - variant: debian
            dockerfile: debian/Dockerfile
            latest: "false"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Compute image tags
        id: tags
        env:
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          VARIANT: ${{ matrix.variant }}
          LATEST: ${{ matrix.latest }}
        run: |
          set -eu
          ver=${REF_NAME#v}                                  # v1.2.3 -> 1.2.3
          base="ghcr.io/$(printf '%s' "$REPO" | tr '[:upper:]' '[:lower:]')"
          # The immutable, fully-qualified tag is always published.
          tags="$base:${ver}-${VARIANT}"
          # Floating tags (major.minor, channel, latest) only for stable releases:
          # a SemVer prerelease (contains '-', e.g. 1.2.3-rc1) must not move them.
          case "$ver" in
          *-*) ;;
          *)
            minor="${ver%.*}"
            [ "$minor" = "$ver" ] || tags="$tags,$base:${minor}-${VARIANT}"
            tags="$tags,$base:${VARIANT}"
            if [ "$LATEST" = "true" ]; then
              tags="$tags,$base:latest"
            fi
            ;;
          esac
          printf 'tags=%s\n' "$tags" >>"$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

  release-unprivileged:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: alpine
            dockerfile: alpine/Dockerfile
          - variant: debian
            dockerfile: debian/Dockerfile
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Compute image tags
        id: tags
        env:
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          VARIANT: ${{ matrix.variant }}
        run: |
          set -eu
          ver=${REF_NAME#v}
          base="ghcr.io/$(printf '%s' "$REPO" | tr '[:upper:]' '[:lower:]')"
          sfx="${VARIANT}-unprivileged"
          # The immutable, fully-qualified tag is always published.
          tags="$base:${ver}-${sfx}"
          # Floating tags only for stable releases (see the base release job).
          case "$ver" in
          *-*) ;;
          *)
            minor="${ver%.*}"
            [ "$minor" = "$ver" ] || tags="$tags,$base:${minor}-${sfx}"
            tags="$tags,$base:${sfx}"
            ;;
          esac
          # The rootless image is built FROM the just-pushed base tag.
          printf 'tags=%s\n' "$tags" >>"$GITHUB_OUTPUT"
          printf 'base=%s:%s-%s\n' "$base" "$ver" "$VARIANT" >>"$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (rootless)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}.unprivileged
          build-args: BASE_IMAGE=${{ steps.tags.outputs.base }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.variant }}-unprivileged
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}-unprivileged
