name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

# Serialize per-tag: two tags pushed close together must not race on the
# floating tags (latest, alpine, 1.11) where the last writer wins.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # Docker Hub repository (namespace/repo) the images are mirrored to, alongside
  # GHCR. Override here if the Docker Hub namespace ever changes.
  DOCKERHUB_REPO: 6run0/angie

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      # Whether this is a stable (non-prerelease) Angie version. Both matrix legs
      # compute the same value from the tag, so the job output is deterministic.
      stable: ${{ steps.tags.outputs.stable }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: alpine
            dockerfile: alpine/Dockerfile
            latest: "true"
          - variant: debian
            dockerfile: debian/Dockerfile
            latest: "false"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 # zizmor: ignore[artipacked] (no git push; persisted token unused)

      - name: Compute image tags
        id: tags
        env:
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          VARIANT: ${{ matrix.variant }}
          LATEST: ${{ matrix.latest }}
          DOCKERFILE: ${{ matrix.dockerfile }}
        run: |
          set -eu
          # Release tags carry the Angie version plus a packaging build number:
          # vX.Y.Z-buildN. Split them apart.
          ref=${REF_NAME#v}                                  # v1.11.8-build1 -> 1.11.8-build1
          case "$ref" in
          *-build[0-9]*) ;;
          *) echo "release tag must be vX.Y.Z-buildN (got '$REF_NAME')" >&2; exit 1 ;;
          esac
          build=${ref##*-build}                              # 1
          angie=${ref%-build*}                               # 1.11.8 (or 1.11.8-rc1)
          case "$build" in
          ''|*[!0-9]*) echo "build number must be numeric (got '$build')" >&2; exit 1 ;;
          esac
          # Guard: the image's pinned Angie version must equal the tag's version,
          # so a published tag never lies about what is inside.
          pinned=$(sed -n 's/^ARG ANGIE_VERSION=//p' "$DOCKERFILE" | head -1)
          if [ "$pinned" != "$angie" ]; then
            echo "tag Angie version '$angie' != ARG ANGIE_VERSION '$pinned' in $DOCKERFILE" >&2
            exit 1
          fi
          ghcr="ghcr.io/$(printf '%s' "$REPO" | tr '[:upper:]' '[:lower:]')"
          hub="docker.io/${DOCKERHUB_REPO}"
          # Append the full tag set for one registry base to $tags. The immutable
          # version+build tag is always published; floating tags (patch, minor,
          # channel, latest) only for stable releases: a prerelease Angie version
          # (the version part keeps a '-', e.g. 1.11.8-rc1) must not move them.
          append_tags() {
            base=$1
            tags="${tags:+$tags,}$base:${angie}-build${build}-${VARIANT}"
            case "$angie" in
            *-*) ;;
            *)
              tags="$tags,$base:${angie}-${VARIANT}"
              # minor floating tag only for a 3-component X.Y.Z version.
              case "$angie" in
              *.*.*) tags="$tags,$base:${angie%.*}-${VARIANT}" ;;
              esac
              tags="$tags,$base:${VARIANT}"
              if [ "$LATEST" = "true" ]; then
                tags="$tags,$base:latest"
              fi
              ;;
            esac
          }
          tags=""
          append_tags "$ghcr"   # GitHub Container Registry
          append_tags "$hub"    # Docker Hub
          # Stable iff the Angie version has no prerelease segment (same rule the
          # floating tags use above). Gates the Docker Hub overview sync.
          case "$angie" in
          *-*) stable=no ;;
          *) stable=yes ;;
          esac
          {
            printf 'tags=%s\n' "$tags"
            printf 'angie=%s\n' "$angie"
            printf 'image_version=%s-build%s\n' "$angie" "$build"
            printf 'stable=%s\n' "$stable"
          } >>"$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          # registry omitted -> defaults to Docker Hub (docker.io).
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            ANGIE_VERSION=${{ steps.tags.outputs.angie }}
            IMAGE_VERSION=${{ steps.tags.outputs.image_version }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

  release-unprivileged:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: alpine
            dockerfile: alpine/Dockerfile
          - variant: debian
            dockerfile: debian/Dockerfile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 # zizmor: ignore[artipacked] (no git push; persisted token unused)

      - name: Compute image tags
        id: tags
        env:
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          VARIANT: ${{ matrix.variant }}
        run: |
          set -eu
          ref=${REF_NAME#v}
          case "$ref" in
          *-build[0-9]*) ;;
          *) echo "release tag must be vX.Y.Z-buildN (got '$REF_NAME')" >&2; exit 1 ;;
          esac
          build=${ref##*-build}
          angie=${ref%-build*}
          ghcr="ghcr.io/$(printf '%s' "$REPO" | tr '[:upper:]' '[:lower:]')"
          hub="docker.io/${DOCKERHUB_REPO}"
          sfx="${VARIANT}-unprivileged"
          # Append the full tag set for one registry base to $tags (see the base
          # release job). The rootless variant has no `latest`.
          append_tags() {
            base=$1
            tags="${tags:+$tags,}$base:${angie}-build${build}-${sfx}"
            case "$angie" in
            *-*) ;;
            *)
              tags="$tags,$base:${angie}-${sfx}"
              # minor floating tag only for a 3-component X.Y.Z version.
              case "$angie" in
              *.*.*) tags="$tags,$base:${angie%.*}-${sfx}" ;;
              esac
              tags="$tags,$base:${sfx}"
              ;;
            esac
          }
          tags=""
          append_tags "$ghcr"   # GitHub Container Registry
          append_tags "$hub"    # Docker Hub
          printf 'tags=%s\n' "$tags" >>"$GITHUB_OUTPUT"
          # The rootless image is built FROM the just-pushed immutable base tag.
          printf 'base=%s:%s-build%s-%s\n' "$ghcr" "$angie" "$build" "$VARIANT" >>"$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          # registry omitted -> defaults to Docker Hub (docker.io).
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (rootless)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}.unprivileged
          build-args: BASE_IMAGE=${{ steps.tags.outputs.base }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.variant }}-unprivileged
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}-unprivileged

  dockerhub-description:
    # Mirror docs/dockerhub-overview.md into the Docker Hub repository overview.
    # Runs once per release (not per variant) after the base images are published.
    # Skipped for prerelease tags so a -rc build never overwrites the overview.
    needs: release
    if: needs.release.outputs.stable == 'yes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 # zizmor: ignore[artipacked] (no git push; persisted token unused)
      - name: Sync README to Docker Hub overview
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_REPO }}
          readme-filepath: ./docs/dockerhub-overview.md
