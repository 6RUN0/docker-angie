name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

# Serialize all release runs: tags pushed close together must not race on the
# shared floating tags (latest, alpine, 1.11) where the last writer wins. A
# single static group forces every run to queue instead of overlapping; a
# per-ref group would only serialize re-runs of the same tag, not the race
# between two different tags.
concurrency:
  group: release
  cancel-in-progress: false

env:
  # Docker Hub repository (namespace/repo) the images are mirrored to, alongside
  # GHCR. Override here if the Docker Hub namespace ever changes.
  DOCKERHUB_REPO: 6run0/angie

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: alpine
            dockerfile: alpine/Dockerfile
            latest: "true"
          - variant: debian
            dockerfile: debian/Dockerfile
            latest: "false"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.0 # zizmor: ignore[artipacked] (no git push; persisted token unused)
        with:
          fetch-depth: 0  # ordering guard reads every release tag

      - name: Compute image tags
        id: tags
        uses: ./.github/actions/compute-tags
        with:
          ref-name: ${{ github.ref_name }}
          repository: ${{ github.repository }}
          dockerhub-repo: ${{ env.DOCKERHUB_REPO }}
          suffix: ${{ matrix.variant }}
          latest: ${{ matrix.latest }}
          dockerfile: ${{ matrix.dockerfile }}

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          # registry omitted -> defaults to Docker Hub (docker.io).
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            ANGIE_VERSION=${{ steps.tags.outputs.angie }}
            IMAGE_VERSION=${{ steps.tags.outputs.image-version }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

  release-unprivileged:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: alpine
            dockerfile: alpine/Dockerfile
          - variant: debian
            dockerfile: debian/Dockerfile
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.0 # zizmor: ignore[artipacked] (no git push; persisted token unused)
        with:
          fetch-depth: 0  # ordering guard reads every release tag

      - name: Compute image tags
        id: tags
        uses: ./.github/actions/compute-tags
        with:
          ref-name: ${{ github.ref_name }}
          repository: ${{ github.repository }}
          dockerhub-repo: ${{ env.DOCKERHUB_REPO }}
          suffix: ${{ matrix.variant }}-unprivileged

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          # registry omitted -> defaults to Docker Hub (docker.io).
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (rootless)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}.unprivileged
          # Built FROM the just-pushed immutable privileged base tag.
          build-args: BASE_IMAGE=${{ steps.tags.outputs.ghcr }}:${{ steps.tags.outputs.image-version }}-${{ matrix.variant }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.variant }}-unprivileged
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}-unprivileged

  # Publish the GitHub Release once every image is in both registries. Notes are
  # lifted from the matching CHANGELOG.md section, so the tag, the changelog, and
  # the release page never drift. Gated on the build jobs: a release page must
  # not point at images that failed to publish. A failure here cannot unpublish
  # the images (they are already pushed), and the step is idempotent.
  github-release:
    needs: [release, release-unprivileged]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -eu
          ref=${REF_NAME#v}                                  # v1.11.8-build1 -> 1.11.8-build1
          case "$ref" in
          *-build[0-9]*) ;;
          *) echo "release tag must be vX.Y.Z-buildN (got '$REF_NAME')" >&2; exit 1 ;;
          esac
          case "${ref##*-build}" in
          ''|*[!0-9]*) echo "build number must be numeric (got '${ref##*-build}')" >&2; exit 1 ;;
          esac
          # Idempotent: a re-run, or a release created by hand, must not fail here.
          if gh release view "$REF_NAME" --repo "$REPO" >/dev/null 2>&1; then
            echo "release $REF_NAME already exists; nothing to do"
            exit 0
          fi
          # Lift exactly this version's section out of the changelog. index()==1
          # is a literal prefix match, so dots and dashes in the version are safe.
          # Stop at the next entry header or the link-reference block.
          notes=$(mktemp)
          awk -v ver="$ref" '
            index($0, "## [" ver "]") == 1 { capture = 1; next }
            capture && (/^## \[/ || /^\[[^]]+\]: /) { exit }
            capture { print }
          ' CHANGELOG.md >"$notes"
          if ! grep -q '[^[:space:]]' "$notes"; then
            echo "no CHANGELOG.md section found for '$ref'" >&2
            exit 1
          fi
          # The version part keeps a '-' for a prerelease Angie (e.g.
          # 1.11.8-rc1-build1 -> 1.11.8-rc1): mark it and leave 'latest' put.
          angie=${ref%-build*}
          case "$angie" in
          *-*) channel=--prerelease ;;
          *) channel=--latest ;;
          esac
          gh release create "$REF_NAME" \
            --repo "$REPO" \
            --title "$REF_NAME" \
            --verify-tag \
            --notes-file "$notes" \
            "$channel"
