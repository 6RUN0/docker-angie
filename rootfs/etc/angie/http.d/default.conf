# Universal loopback classifier: 1 when the request originates from the local
# host (127.0.0.0/8 or ::1), 0 otherwise. Reusable by any server/location that
# needs a "request came from this host" gate — here the container HEALTHCHECK.
#
# The gate keys on $remote_addr, the real TCP peer, which a remote client cannot
# spoof on a direct connection. If you front this image with a proxy and enable
# real_ip (set_real_ip_from + real_ip_header X-Forwarded-For) for an untrusted
# upstream, $remote_addr becomes the client-supplied header value and a remote
# client can forge 127.0.0.1 to pass this gate. Only enable real_ip for trusted
# upstreams, or gate on $realip_remote_addr (the true peer) in that topology.
geo $loopback {
  default              0;
  127.0.0.0/8          1;
  ::1/128              1;
  ::ffff:127.0.0.0/104 1;
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  # Liveness endpoint for the container HEALTHCHECK. `allow`/`deny` would be
  # ineffective: `return` runs in the rewrite phase, before the access phase, so
  # the access check never fires. Gate on $loopback instead (a documented-safe
  # `if` containing only a `return`) and answer 404 to non-local clients so the
  # endpoint is indistinguishable from "not configured".
  location = /healthz {
    access_log off;
    if ($loopback = 0) {
      return 404;
    }
    return 200 "ok\n";
  }

  location / {
    return 444;
  }
}
