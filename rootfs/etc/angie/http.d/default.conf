# Universal loopback classifier: 1 when the request originates from the local
# host (127.0.0.0/8 or ::1), 0 otherwise. Reusable by any server/location that
# needs a "request came from this host" gate — here the container HEALTHCHECK.
geo $loopback {
  default              0;
  127.0.0.0/8          1;
  ::1/128              1;
  ::ffff:127.0.0.0/104 1;
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  # Liveness endpoint for the container HEALTHCHECK. `allow`/`deny` would be
  # ineffective: `return` runs in the rewrite phase, before the access phase, so
  # the access check never fires. Gate on $loopback instead (a documented-safe
  # `if` containing only a `return`) and answer 404 to non-local clients so the
  # endpoint is indistinguishable from "not configured".
  location = /healthz {
    access_log off;
    if ($loopback = 0) {
      return 404;
    }
    return 200 "ok\n";
  }

  location / {
    return 444;
  }
}
