# SSL Settings
# https://angie.software/angie/docs/configuration/modules/http/http_ssl/

# Default: none
ssl_session_cache shared:SSL_ANGIE_CACHE:5m;
# Specifies a time during which a client may reuse the session parameters.
# Default is '5m'.
ssl_session_timeout 1h;
# Let the client choose the cipher. With a modern all-AEAD cipher list, client
# preference lets mobile clients without AES-NI pick ChaCha20-Poly1305 over
# AES-GCM; Mozilla and the nginx/angie maintainers recommend off. Default 'off'.
ssl_prefer_server_ciphers off;
