# Zstandard Settings
# See https://en.angie.software/angie/docs/installation/external-modules/zstd/
zstd on;
# On-the-fly compression runs per response, so keep the CPU cost low: level 1
# already beats gzip on ratio at a comparable speed. Raise it for static
# precompression (021-zstd_static.conf), not for live traffic. Range is 1-22.
zstd_comp_level 1;
zstd_min_length 128;
zstd_types
  application/atom+xml
  application/javascript
  application/json
  application/ld+json
  application/manifest+json
  application/rss+xml
  application/vnd.ms-fontobject
  application/x-font-opentype
  application/x-font-truetype
  application/x-font-ttf
  application/x-javascript
  application/xhtml+xml
  application/xml
  font/eot
  font/opentype
  font/otf
  font/ttf
  image/svg+xml
  image/vnd.microsoft.icon
  image/x-icon
  text/css
  text/csv
  text/javascript
  text/markdown
  text/plain
  text/x-markdown
  text/xml
;
