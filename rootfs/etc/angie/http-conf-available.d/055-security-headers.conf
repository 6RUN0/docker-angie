# Baseline security response headers.
# https://angie.software/angie/docs/configuration/modules/http/http_headers/
#
# Conservative, non-breaking defaults applied with `always` so they are emitted
# on error responses (4xx/5xx) too. HSTS, CSP and X-XSS-Protection are
# deliberately omitted: HSTS is meaningless on the image's :80 listener, CSP is
# application-specific, and X-XSS-Protection is deprecated. Add those per-vhost
# via /etc/angie/custom.
#
# CAVEAT: add_header does NOT merge — a server/location that defines its own
# add_header replaces the inherited set, dropping these. If a custom vhost adds
# headers, repeat the ones below there too.
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
