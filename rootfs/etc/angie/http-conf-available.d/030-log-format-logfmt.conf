# Loki log format. This is the default access log (ANGIE_LOG_LOGFMT=yes).
# `path` uses $request_uri, which includes the raw query string: any secret
# carried in a URL (?token=, ?api_key=, session ids) is written to stdout. Swap
# to $uri in your own format if you serve secrets in query params; the default
# keeps $request_uri because dashboards expect the full path.
log_format logfmt 'remote_addr=$remote_addr'
  ' remote_user=$remote_user'
  ' host=$host'
  ' path=$request_uri'
  ' method=$request_method'
  ' status=$status'
  ' referrer=$http_referer'
  ' user_agent="$http_user_agent"'
  ' length=$bytes_sent'
  ' gzip_ratio=$gzip_ratio'
  ' request_time=$request_time'
  ' upstream_addr=$upstream_addr'
  ' date=$time_iso8601'
  ' request_id=$request_id';
