# Rootless overlay: relocate the temp paths angie creates at startup from the
# root-owned /var/cache/angie into /tmp/angie so any uid can create them.
client_body_temp_path /tmp/angie/client_temp;
proxy_temp_path /tmp/angie/proxy_temp;
fastcgi_temp_path /tmp/angie/fastcgi_temp;
uwsgi_temp_path /tmp/angie/uwsgi_temp;
scgi_temp_path /tmp/angie/scgi_temp;
