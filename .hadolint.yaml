# Intentionally relaxed rules. Each is a deliberate choice for this image, not an
# oversight — documented here so CI (hadolint) stays meaningful.
ignored:
  # angie + module packages are deliberately unpinned: the image tracks upstream
  # security updates, and core/modules must stay on the same current version.
  - DL3018 # apk: pin versions
  - DL3008 # apt: pin versions
  # `cd` into a mktemp dir inside a single RUN (the angie-ctl clone) is scoped to
  # that layer; WORKDIR would leak into later instructions.
  - DL3003
  # wget without a progress bar is fine in a build layer.
  - DL3047
